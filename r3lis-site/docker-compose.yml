version: '3.8'

services:
  # 1. 파이썬 데이터 수집 봇
  notion-sync:
    build: ./python
    volumes:
      - ./data:/data  # 변경: 리눅스의 물리적 data/ 폴더와 컨테이너의 /data 폴더를 동기화
    restart: always

  # 2. Go 고속 렌더링 서버
  go-renderer:
    build: ./go
    volumes:
      - ./data:/data  # 파이썬과 동일한 물리적 폴더를 공유하여 JSON을 읽음
    expose:
      - "8080"
    restart: always

  # 3. Nginx 웹 서버
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # ★ 중요: 기존 메인 홈페이지(index.html 등)가 있는 실제 리눅스 폴더 경로를 연결!
      # (아래 경로 '/home/user/www/r3lis-main'은 예시이므로 실제 메인 페이지 폴더 경로로 변경해주세요)
      - /home/user/www/r3lis-site:/usr/share/nginx/html:ro 
      - /home/user/www/r3lis-site/data/images:/usr/share/nginx/images:ro 
    ports:
      - "8080:80"  # 외부 터널의 8080 트래픽을 모두 이 Nginx가 받습니다.
    depends_on:
      - go-renderer
    restart: always