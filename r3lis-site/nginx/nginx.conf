events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name r3lis.com www.r3lis.com;

        # 1. 기존 메인 페이지 (Relis Workshop 포트폴리오 홈)
        # (주의: 기존 메인 HTML 파일들이 Nginx 컨테이너의 /usr/share/nginx/html 에 마운트되어 있다고 가정한 기본 설정입니다. 상황에 맞게 root 경로를 수정해 주세요.)
        location / {
            # root /usr/share/nginx/html;
            # index index.html index.htm;

            # proxy_pass 주소는 기존 /blog 설정과 동일하게 맞춰주세요.
            proxy_pass http://go-renderer:8080; 
        
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /static/ {
            proxy_pass http://go-renderer:8080;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. 노션 블로그 목록 페이지 (r3lis.com/blog)
        location /blog {
            proxy_pass http://go-renderer:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # ★ 이거 한 줄 추가
        }

        # 3. 노션 개별 포스팅 페이지 (r3lis.com/post/~~)
        location /post/ {
            proxy_pass http://go-renderer:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # ★ 이거 한 줄 추가
        }

         # 4. 로컬 다운로드된 노션 이미지 서빙
        location /images/ {
            # 도커 컨테이너 내부의 이미지 폴더 경로를 가리킵니다.
            alias /usr/share/nginx/images/;
            
            # (선택) 브라우저 캐시를 적용해 로딩 속도를 최적화합니다.
            expires 30d; 
        }
    }
}
