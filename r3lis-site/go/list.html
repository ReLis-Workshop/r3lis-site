<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Relis Workshop</title>
    <link rel="icon" type="image/png" href="/static/21_20240831124804.png">
    
    <link rel="stylesheet" href="/static/style.css">

    <meta property="og:title" content="Relis Workshop | 렐리스 공방">
    <meta property="og:description" content="포트폴리오 리스트">
    <meta property="og:image" content="https://r3lis.com/static/21_20240831124804.png">
    <meta name="theme-color" content="#5c7cff">

    <!-- ======================================================= -->
    <!-- ★ 아래는 블로그 본문(탭, 게시글)이 깨지지 않기 위한 전용 스타일입니다. -->
    <!-- ======================================================= -->
    <style>
        :root {
            --hover-color: #5c7cff;
            --badge-bg: rgba(92, 124, 255, 0.15);
        }
        
        #content { flex: 1; overflow-y: auto; padding: 72px 12% 100px; }
        h1 { font-size: 2.2rem; margin: 0 0 24px; }

        /* 탭(Tab) 메뉴 스타일 */
        .tabs { display: flex; gap: 10px; margin-bottom: 32px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 16px; overflow-x: auto; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: transparent; border: 1px solid rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.45); font-size: 0.9rem; font-weight: 600; padding: 8px 18px; cursor: pointer; border-radius: 20px; transition: 0.2s; white-space: nowrap; text-decoration: none; }
        .tab-btn:hover { border-color: var(--hover-color); color: rgba(255, 255, 255, 0.9); }
        .tab-btn.active { background: var(--hover-color); border-color: var(--hover-color); color: #fff; }

        /* 포스트 카드 스타일 */
        .post-card { display: block; background: #1c2033; padding: 24px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 16px; text-decoration: none; color: rgba(255, 255, 255, 0.9); transition: transform 0.2s, border-color 0.2s; text-decoration: none; }
        .post-card:hover { transform: translateY(-3px); border-color: var(--hover-color); }
        .badge { display: inline-block; background: var(--badge-bg); color: #8da4ff; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; margin-bottom: 12px; }
        .post-card a { text-decoration: none; color: var(--text-color); }
        .post-card h3 { margin: 0 0 8px 0; font-size: 1.3rem; text-decoration: none; }
        .post-card p { margin: 0; font-size: 0.9rem; color: rgba(255, 255, 255, 0.45); }

        /* 💡 선택된 카테고리에 적용될 Active 스타일 */
        .category-btn.active {
            background-color: rgba(140, 110, 255, 0.3); /* 배경에 보라색 채우기 */
            border: 1px solid #8c6eff; /* 선명한 보라색 테두리 */
            color: #ffffff; /* 글자색을 하얗게 강조 */
            box-shadow: 0 0 15px rgba(140, 110, 255, 0.4); /* 은은한 네온 글로우 효과 */
            font-weight: bold;
        }
    </style>
</head>
<body>
    {{template "sidebar" .}}

    <main id="content">
        <h1>📝 Blog</h1>
        
        <div class="tabs">
            <a href="/blog" class="tab-btn">All</a>
            {{range .Categories}}
                <a href="/blog?category={{.}}" class="tab-btn">{{.}}</a>
            {{end}}
        </div>

        {{range .Posts}}
            <a href="/post/{{.PageID}}" class="post-card">
            <h3>{{.CleanTitle}}</h3>
            <div class="badge">{{.Category}}</div>
            <p>{{.CreatedAt}}</p>
            </a>
        {{end}}
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            // 주소창의 파라미터를 가져올 때 이미 한글('기획', '솔로 해커톤')로 예쁘게 번역되어 나옵니다.
            const currentCategory = urlParams.get('category'); 
        
            const categoryLinks = document.querySelectorAll('.tab-btn'); // 사용 중인 클래스명으로 맞춰주세요!

            categoryLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (!href) return;

                if (currentCategory) {
                    // 🚨 핵심 수정: HTML에 적힌 주소(href)도 한글과 띄어쓰기가 완벽하게 보이도록 디코딩해서 비교합니다.
                    const decodedHref = decodeURIComponent(href);
                
                    if (decodedHref.includes(currentCategory)) {
                        link.classList.add('active');
                    }
                } else {
                    // 아무 파라미터도 없는 전체보기(All) 상태
                    if (href === '/blog' || href === '/blog/') {
                        link.classList.add('active');
                    }
                }
            });
        });
    </script>
</body>
</html>
